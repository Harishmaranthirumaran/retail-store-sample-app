# API Gateway — routes traffic to catalog and cart services
# Author: Harishmaran Subbaiah Thirumaran

events {
    worker_connections 1024;
}

http {
    upstream catalog_service {
        server catalog:8080;
    }

    upstream cart_service {
        server cart:8081;
    }

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            return 200 '{"status":"healthy","gateway":"nginx"}\n';
            add_header Content-Type application/json;
        }

        # Catalog service
        location /catalog/ {
            proxy_pass         http://catalog_service/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Cart service
        location /cart/ {
            proxy_pass         http://cart_service/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
