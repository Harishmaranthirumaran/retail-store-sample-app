apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.6.1
        ports:
        - containerPort: 8080
        env:
        - name: COMPONENT_MESSAGE_BROKER
          value: "rabbitmq"
        - name: SPRING_PROFILES_ACTIVE
          value: "prod,rabbitmq"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://orders-db:5432/orders"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "admin"
        - name: DB_PASSWORD
          value: "admin"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq"
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        - name: SPRING_RABBITMQ_USERNAME
          value: "guest"
        - name: SPRING_RABBITMQ_PASSWORD
          value: "guest"
---
apiVersion: v1
kind: Service
metadata:
  name: orders
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: orders
