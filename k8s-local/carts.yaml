apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts-db
  labels:
    app: carts-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carts-db
  template:
    metadata:
      labels:
        app: carts-db
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: carts-db
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: carts-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
  labels:
    app: carts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carts
  template:
    metadata:
      labels:
        app: carts
    spec:
      containers:
      - name: carts
        image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.6.1
        ports:
        - containerPort: 8080
        env:
        - name: RETAIL_CART_PERSISTENCE_PROVIDER
          value: "in-memory"
---
apiVersion: v1
kind: Service
metadata:
  name: carts
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: carts
